<!Doctype html>
<html>
    <head>
        <title>
       MY PAGE
        </title>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
    </head>
    <body>
       
       
        <div class="card">
     <form action="/login" method="POST">
        <h2 >USER LOGIN </h2>
        <label for="name">NAME:-</label>
        <input type="text" name="name" placeholder="ENTER NAME" id="name" required><br><br>
        <label for="email">EMAIL:-</label>
        <input type="text" name="email" placeholder="ENTER EMAIL" id="email" required><br><br>
        <label for="contact">CONTACT:-</label>
        <input type="text" name="contact" placeholder="ENTER CONTACT" id="contact" required><br><br>
        <button type="submit">LOGIN</button>
         {% with messages = get_flashed_messages() %}
         {% if messages %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
         {% endif %}
        {% endwith %}
     </form>
    </div>
    </body>
</html>
